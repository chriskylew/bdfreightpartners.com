<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pre-Qualification | B &amp; D Freight, Inc</title>

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    .q {
      margin-bottom: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      margin-top: 5px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    .btnPrimary {
      background: #4ade80;
      color: black;
    }

    .btnGhost {
      background: #374151;
      color: white;
      text-align: center;
      display: block;
      text-decoration: none;
      line-height: 40px;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .pass { background: #064e3b; }
    .fail { background: #7f1d1d; }

    #tsStatus {
      font-size: 13px;
      margin-top: 8px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <h1>Pre-Qualify in About 60 Seconds</h1>

    <div class="card">

      <div class="q">
        <label for="q1">CDL-A?</label>
        <select id="q1">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="q">
        <label for="q2">2+ years experience?</label>
        <select id="q2">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="q">
        <label for="q3">Owner operator?</label>
        <select id="q3">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="q">
        <label for="q4">MVR consent?</label>
        <select id="q4">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="q">
        <label for="q5">Upload docs?</label>
        <select id="q5">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <div class="q">
        <label for="q6">Start in 7–14 days?</label>
        <select id="q6">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>

      <!-- Turnstile -->
      <div style="margin-top:15px;">
        <div
          class="cf-turnstile"
          data-sitekey="0x4AAAAAADAww3lhW9-k-dU8"
          data-callback="onTurnstileSuccess"
          data-expired-callback="onTurnstileExpire"
          data-error-callback="onTurnstileError"
          data-appearance="always">
        </div>

        <div id="tsStatus">Waiting for verification...</div>
      </div>

      <button id="checkBtn" class="btn btnPrimary" type="button" disabled>
        Check Qualification
      </button>

      <a href="/" class="btn btnGhost">Back to Home</a>

      <div id="pass" class="result pass">
        ✅ Qualified — redirecting to application...
      </div>

      <div id="fail" class="result fail">
        ❌ Not a fit at this time.
      </div>

    </div>
  </div>

  <script>
    const qs = ["q1","q2","q3","q4","q5","q6"].map(id => document.getElementById(id));
    const pass = document.getElementById("pass");
    const fail = document.getElementById("fail");
    const btn = document.getElementById("checkBtn");
    const tsStatus = document.getElementById("tsStatus");

    let token = "";

    function setEnabled(enabled){
      btn.disabled = !enabled;
      btn.style.opacity = enabled ? "1" : "0.5";
    }

    setEnabled(false);

    window.onTurnstileSuccess = (t) => {
      token = t;
      tsStatus.innerText = "Verification complete ✅";
      setEnabled(true);
    };

    window.onTurnstileExpire = () => {
      token = "";
      tsStatus.innerText = "Verification expired ❌";
      setEnabled(false);
    };

    window.onTurnstileError = () => {
      token = "";
      tsStatus.innerText = "Turnstile failed to load ❌";
      setEnabled(false);
    };

    btn.addEventListener("click", () => {
      if (!token) {
        alert("Complete verification first");
        return;
      }

      const allYes = qs.every(q => q.value === "yes");

      if (allYes) {
        pass.style.display = "block";
        fail.style.display = "none";

        setTimeout(() => {
          location.href = "/apply.html"; // IMPORTANT FIX
        }, 800);
      } else {
        fail.style.display = "block";
        pass.style.display = "none";
      }
    });
  </script>

  <!-- optional debug -->
  <script src="/debug-submit.js"></script>

</body>
</html>
