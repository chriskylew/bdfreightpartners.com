<!doctype html>
<!-- VERSION: APPLY-NETLIFY-FUNCTION-FIX-2026-04-20-1 -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply — B &amp; D Freight Partners</title>
  <meta name="description" content="Owner-Operator application. Fast intake with document-ready next steps." />

  <style>
    :root{
      --bg:#0b1220;
      --text:#e9eefc;
      --muted:#b8c4e6;
      --card:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --good:#a7f3d0;
      --accent:#7dd3fc;
      --danger:#fca5a5;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#070b14, var(--bg));
      color:var(--text);
    }

    .wrap{ max-width:900px; margin:0 auto; padding:24px; }
    .top a{ color:var(--muted); text-decoration:none; font-weight:700; }
    h1{ margin:10px 0 8px; font-size:clamp(26px,4vw,36px); }
    p{ color:var(--muted); line-height:1.5; margin:8px 0; }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media (max-width:760px){
      .grid{ grid-template-columns:1fr; }
    }

    label{ display:block; font-weight:800; margin:10px 0 6px; }

    input, textarea, select{
      width:100%;
      background:rgba(255,255,255,.06);
      color:var(--text);
      border: 1px solid rgba(255,255,255,.14);
      border-radius:12px;
      padding:12px;
      font-weight:700;
      box-sizing:border-box;
      outline:none;
    }

    textarea{ min-height:110px; resize:vertical; }

    select{
      display:block;
      height:46px;
      line-height:1.2;
      cursor:pointer;
      -webkit-appearance: menulist !important;
      -moz-appearance: menulist !important;
      appearance: menulist !important;
      background-color: rgba(255,255,255,.06) !important;
      color: var(--text) !important;
      padding-right: 54px !important;
      background-clip: padding-box;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(233,238,252,.95) 50%),
        linear-gradient(135deg, rgba(233,238,252,.95) 50%, transparent 50%),
        linear-gradient(to right, rgba(255,255,255,.14), rgba(255,255,255,.14));
      background-position:
        calc(100% - 18px) 50%,
        calc(100% - 12px) 50%,
        calc(100% - 40px) 50%;
      background-size:
        6px 6px,
        6px 6px,
        1px 22px;
      background-repeat:no-repeat;
    }

    select option{
      color:#0b1220;
      background:#ffffff;
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:14px 16px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .btnPrimary{
      background:linear-gradient(90deg,var(--accent),var(--good));
      color:#051018;
    }

    .btnPrimary:disabled{
      opacity:.7;
      cursor:not-allowed;
    }

    .btnGhost{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      margin-top:10px;
      text-decoration:none;
    }

    .note{ font-size:13px; margin-top:10px; }

    .hp{
      position:absolute;
      left:-10000px;
      width:1px;
      height:1px;
      overflow:hidden;
    }

    .status{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      display:none;
      font-weight:700;
    }

    .status.error{
      display:block;
      color:var(--danger);
      border-color:rgba(252,165,165,.35);
      background:rgba(127,29,29,.18);
    }

    .status.success{
      display:block;
      color:var(--good);
      border-color:rgba(167,243,208,.35);
      background:rgba(6,78,59,.18);
    }
  </style>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
<div class="wrap">
  <div class="top">
    <a href="/index.html">← Back</a>
  </div>

  <h1>Owner-Operator Application</h1>
  <p>Fast intake. If qualified, we’ll reach out directly.</p>

  <div class="card">
    <form id="appForm" novalidate>
      <p class="hp">
        <label>Don’t fill this out <input name="bot-field" autocomplete="off" /></label>
      </p>

      <div class="grid">
        <div>
          <label for="contact_name">Full Name *</label>
          <input id="contact_name" name="contact_name" required autocomplete="name" />
        </div>

        <div>
          <label for="phone">Phone *</label>
          <input id="phone" name="phone" required inputmode="tel" autocomplete="tel" placeholder="555-555-5555" />
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="name@email.com" />
        </div>

        <div>
          <label for="home_zip">Home ZIP</label>
          <input id="home_zip" name="home_zip" inputmode="numeric" autocomplete="postal-code" />
        </div>

        <div>
          <label for="equipment_type">Equipment Type</label>
          <select id="equipment_type" name="equipment_type">
            <option value="">— choose —</option>
            <option>Dry Van</option>
            <option>Reefer</option>
            <option>Flatbed</option>
            <option>Power Only</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label for="truck_count"># of Trucks</label>
          <select id="truck_count" name="truck_count">
            <option value="">— choose —</option>
            <option>1</option>
            <option>2–3</option>
            <option>4–10</option>
            <option>10+</option>
          </select>
        </div>
      </div>

      <label for="preferred_regions">Preferred Regions / Lanes</label>
      <textarea id="preferred_regions" name="preferred_regions" placeholder="Example: Midwest lanes, avoid Chicago, prefer 450–550 mile legs"></textarea>

      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" placeholder="Anything we should know?"></textarea>

      <div
        class="cf-turnstile"
        data-sitekey="0x4AAAAAACHzcY4o_6jnmTso"
        data-theme="dark">
      </div>

      <button id="submitBtn" class="btn btnPrimary" type="submit">Submit Application →</button>
      <a class="btn btnGhost" href="/index.html">Back to Home</a>

      <div id="statusMsg" class="status" aria-live="polite"></div>

      <p class="note">Bot protection enabled.</p>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById("appForm");
  const submitBtn = document.getElementById("submitBtn");
  const statusMsg = document.getElementById("statusMsg");

  function showStatus(message, type) {
    statusMsg.textContent = message;
    statusMsg.className = `status ${type}`;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    statusMsg.className = "status";
    statusMsg.textContent = "";

    const contactName = form.contact_name.value.trim();
    const phone = form.phone.value.trim();
    const turnstileToken =
      form.querySelector('input[name="cf-turnstile-response"]')?.value?.trim() || "";

    if (!contactName || !phone) {
      showStatus("Please enter your full name and phone number.", "error");
      return;
    }

    if (!turnstileToken) {
      showStatus("Please complete the bot check before submitting.", "error");
      return;
    }

    const payload = {
      contact_name: contactName,
      phone,
      email: form.email.value.trim(),
      home_zip: form.home_zip.value.trim(),
      equipment_type: form.equipment_type.value,
      truck_count: form.truck_count.value,
      preferred_regions: form.preferred_regions.value.trim(),
      notes: form.notes.value.trim(),
      "cf-turnstile-response": turnstileToken,
    };

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    try {
      const response = await fetch("/.netlify/functions/apply", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify(payload),
      });

      const result = await response.json().catch(() => ({}));

      if (!response.ok || !result.ok) {
        const detail =
          result?.error ||
          result?.detail?.error ||
          "Unable to submit right now. Please try again.";
        showStatus(`Submission failed: ${detail}`, "error");
        if (window.turnstile) {
          window.turnstile.reset();
        }
        return;
      }

      showStatus("Application submitted successfully. Redirecting...", "success");
      window.location.href = "/thank-you.html";
    } catch (error) {
      showStatus("Network error. Please try again in a moment.", "error");
      if (window.turnstile) {
        window.turnstile.reset();
      }
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Application →";
    }
  });
</script>
</body>
</html>
