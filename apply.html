<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply | B &amp; D Freight, Inc</title>

  <!-- Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 760px;
      margin: auto;
    }

    .card {
      background: #111827;
      padding: 24px;
      border-radius: 12px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #0f172a;
      color: white;
      margin-bottom: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      background: #4ade80;
      color: black;
      cursor: pointer;
    }

    #status {
      margin-top: 14px;
      font-weight: bold;
      min-height: 22px;
    }

    #status.error { color: #fca5a5; }
    #status.success { color: #86efac; }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #93c5fd;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .row, .row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>Application Form</h1>

      <form id="apply-form">
        <label>Full Name</label>
        <input name="name" required />

        <div class="row">
          <input name="email" type="email" placeholder="Email" required />
          <input name="phone" type="tel" placeholder="Phone" required />
        </div>

        <input name="street" placeholder="Street Address" />

        <div class="row-3">
          <input name="city" placeholder="City" required />
          <input name="state" placeholder="State" required />
          <input name="zipcode" placeholder="Zip Code" required />
        </div>

        <textarea name="message" placeholder="Additional details"></textarea>

        <div style="margin:15px 0;">
          <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAADAww3lhW9-k-dU8"
            data-callback="onTurnstileSuccess"
            data-expired-callback="onTurnstileExpired"
            data-error-callback="onTurnstileError">
          </div>
        </div>

        <button type="submit">Submit Application →</button>

        <div id="status"></div>
      </form>

      <a class="back-link" href="/">← Return to Home</a>
    </div>
  </div>

  <script>
    const form = document.querySelector("#apply-form");
    const btn = form.querySelector("button");
    const statusEl = document.querySelector("#status");

    let token = "";

    function showStatus(msg, type="") {
      statusEl.textContent = msg;
      statusEl.className = type;
    }

    function onTurnstileSuccess(t) {
      token = t;
    }

    function onTurnstileExpired() {
      token = "";
      showStatus("Verification expired", "error");
    }

    function onTurnstileError() {
      token = "";
      showStatus("Verification failed", "error");
    }

    window.onTurnstileSuccess = onTurnstileSuccess;
    window.onTurnstileExpired = onTurnstileExpired;
    window.onTurnstileError = onTurnstileError;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!token) {
        showStatus("Complete the bot check", "error");
        return;
      }

      const payload = Object.fromEntries(new FormData(form));
      payload["cf-turnstile-response"] = token;

      btn.disabled = true;
      btn.innerText = "Submitting...";

      try {
        const res = await fetch("/.netlify/functions/apply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(()=>({}));

        if (!res.ok || !data.ok) {
          showStatus("Submission failed", "error");
          btn.disabled = false;
          btn.innerText = "Submit Application →";
          return;
        }

        showStatus("Success! Redirecting...", "success");

        // 🚀 HARD redirect (this fixes your issue)
        window.location.href = "/thank-you.html";

      } catch {
        showStatus("Network error", "error");
        btn.disabled = false;
        btn.innerText = "Submit Application →";
      }
    });
  </script>

</body>
</html>
