<!doctype html>
<!-- VERSION: APPLY-DROPDOWNS-FIXED-2025-12-21 -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply — B &amp; D Freight Partners</title>
  <meta name="description" content="Owner-Operator application. Fast intake with document-ready next steps." />

  <style>
    :root {
      --bg:#0b1220;
      --text:#e9eefc;
      --muted:#b8c4e6;
      --card:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --good:#a7f3d0;
      --accent:#7dd3fc;
    }

    body {
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#070b14, var(--bg));
      color:var(--text);
    }

    .wrap { max-width:900px; margin:0 auto; padding:24px; }
    .top a { color:var(--muted); text-decoration:none; font-weight:700; }
    h1 { margin:10px 0 8px; font-size:clamp(26px,4vw,36px); }
    p { color:var(--muted); line-height:1.5; margin:8px 0; }

    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media (max-width:760px){
      .grid { grid-template-columns:1fr; }
    }

    label { display:block; font-weight:800; margin:10px 0 6px; }

    input, textarea, select {
      width:100%;
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      padding:12px;
      font-weight:700;
      box-sizing:border-box;
    }

    /* 🔑 FIX: FORCE NATIVE DROPDOWN UI */
    select {
      -webkit-appearance: menulist;
      appearance: menulist;
      background-color: rgba(255,255,255,.06);
    }

    textarea { min-height:110px; resize:vertical; }

    .btn {
      border:0;
      border-radius:14px;
      padding:14px 16px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btnPrimary {
      background:linear-gradient(90deg,var(--accent),var(--good));
      color:#051018;
      width:100%;
    }

    .btnGhost {
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      width:100%;
      margin-top:10px;
      text-decoration:none;
    }

    .note { font-size:13px; margin-top:10px; }

    .hp {
      position:absolute;
      left:-10000px;
      width:1px;
      height:1px;
      overflow:hidden;
    }
  </style>

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
<div class="wrap">
  <div class="top">
    <a href="/index.html">← Back</a>
  </div>

  <h1>Owner-Operator Application</h1>
  <p>Fast intake. If qualified, we’ll reach out directly.</p>

  <div class="card">
    <form
      name="oo-application"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/thank-you.html">

      <input type="hidden" name="form-name" value="oo-application" />

      <p class="hp">
        <label>Don’t fill this out <input name="bot-field" /></label>
      </p>

      <div class="grid">
        <div>
          <label>Full Name *</label>
          <input name="contact_name" required />
        </div>

        <div>
          <label>Phone *</label>
          <input name="phone" required inputmode="tel" />
        </div>

        <div>
          <label>Email</label>
          <input name="email" type="email" />
        </div>

        <div>
          <label>Home ZIP</label>
          <input name="home_zip" inputmode="numeric" />
        </div>

        <div>
          <label>Equipment Type</label>
          <select name="equipment_type">
            <option value="">— choose —</option>
            <option>Dry Van</option>
            <option>Reefer</option>
            <option>Flatbed</option>
            <option>Power Only</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label># of Trucks</label>
          <select name="truck_count">
            <option value="">— choose —</option>
            <option>1</option>
            <option>2–3</option>
            <option>4–10</option>
            <option>10+</option>
          </select>
        </div>
      </div>

      <label>Preferred Regions / Lanes</label>
      <textarea name="preferred_regions"></textarea>

      <label>Notes</label>
      <textarea name="notes"></textarea>

      <div class="cf-turnstile"
           data-sitekey="0x4AAAAAACHzcY4o_6jnmTso"
           data-theme="dark"></div>

      <button class="btn btnPrimary" type="submit">Submit Application →</button>
      <a class="btn btnGhost" href="/index.html">Back to Home</a>

      <p class="note">Bot protection enabled.</p>
    </form>
  </div>
</div>
</body>
</html>
