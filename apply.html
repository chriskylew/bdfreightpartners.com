<!doctype html>
<!-- VERSION: APPLY-DROPDOWNS-FIXED-2025-12-21-2 -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply — B &amp; D Freight Partners</title>
  <meta name="description" content="Owner-Operator application. Fast intake with document-ready next steps." />

  <style>
    :root{
      --bg:#0b1220;
      --text:#e9eefc;
      --muted:#b8c4e6;
      --card:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.10);
      --good:#a7f3d0;
      --accent:#7dd3fc;
    }

    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#070b14, var(--bg));
      color:var(--text);
    }

    .wrap{ max-width:900px; margin:0 auto; padding:24px; }
    .top a{ color:var(--muted); text-decoration:none; font-weight:700; }
    h1{ margin:10px 0 8px; font-size:clamp(26px,4vw,36px); }
    p{ color:var(--muted); line-height:1.5; margin:8px 0; }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media (max-width:760px){
      .grid{ grid-template-columns:1fr; }
    }

    label{ display:block; font-weight:800; margin:10px 0 6px; }

    input, textarea, select{
      width:100%;
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid rgba(255,255,255,.14);
      border-radius:12px;
      padding:12px;
      font-weight:700;
      box-sizing:border-box;
      outline:none;
    }

    textarea{ min-height:110px; resize:vertical; }

    /* ✅ DROPDOWN VISIBILITY / NATIVE CONTROL FIX */
    select{
      display:block;
      height:46px;
      line-height:1.2;
      cursor:pointer;

      /* force native dropdown UI */
      -webkit-appearance: menulist !important;
      -moz-appearance: menulist !important;
      appearance: menulist !important;

      background-color: rgba(255,255,255,.06) !important;
      color: var(--text) !important;

      /* space for the arrow + prevent clipping */
      padding-right: 36px;
      background-clip: padding-box;
    }

    /* make sure options are readable in the popup menu */
    select option{
      color:#0b1220;
      background:#ffffff;
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:14px 16px;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .btnPrimary{
      background:linear-gradient(90deg,var(--accent),var(--good));
      color:#051018;
    }

    .btnGhost{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      margin-top:10px;
      text-decoration:none;
    }

    .note{ font-size:13px; margin-top:10px; }

    .hp{
      position:absolute;
      left:-10000px;
      width:1px;
      height:1px;
      overflow:hidden;
    }
  </style>

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>

<body>
<div class="wrap">
  <div class="top">
    <a href="/index.html">← Back</a>
  </div>

  <h1>Owner-Operator Application</h1>
  <p>Fast intake. If qualified, we’ll reach out directly.</p>

  <div class="card">
    <form
      name="oo-application"
      method="POST"
      data-netlify="true"
      netlify
      data-netlify-honeypot="bot-field"
      action="/thank-you.html">

      <!-- Required for Netlify form capture -->
      <input type="hidden" name="form-name" value="oo-application" />

      <!-- Honeypot (spam trap) -->
      <p class="hp">
        <label>Don’t fill this out <input name="bot-field" autocomplete="off" /></label>
      </p>

      <div class="grid">
        <div>
          <label for="contact_name">Full Name *</label>
          <input id="contact_name" name="contact_name" required autocomplete="name" />
        </div>

        <div>
          <label for="phone">Phone *</label>
          <input id="phone" name="phone" required inputmode="tel" autocomplete="tel" placeholder="555-555-5555" />
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="name@email.com" />
        </div>

        <div>
          <label for="home_zip">Home ZIP</label>
          <input id="home_zip" name="home_zip" inputmode="numeric" autocomplete="postal-code" />
        </div>

        <div>
          <label for="equipment_type">Equipment Type</label>
          <select id="equipment_type" name="equipment_type">
            <option value="">— choose —</option>
            <option>Dry Van</option>
            <option>Reefer</option>
            <option>Flatbed</option>
            <option>Power Only</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label for="truck_count"># of Trucks</label>
          <select id="truck_count" name="truck_count">
            <option value="">— choose —</option>
            <option>1</option>
            <option>2–3</option>
            <option>4–10</option>
            <option>10+</option>
          </select>
        </div>
      </div>

      <label for="preferred_regions">Preferred Regions / Lanes</label>
      <textarea id="preferred_regions" name="preferred_regions" placeholder="Example: Midwest lanes, avoid Chicago, prefer 450–550 mile legs"></textarea>

      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" placeholder="Anything we should know?"></textarea>

      <div class="cf-turnstile"
           data-sitekey="0x4AAAAAACHzcY4o_6jnmTso"
           data-theme="dark"></div>

      <button class="btn btnPrimary" type="submit">Submit Application →</button>
      <a class="btn btnGhost" href="/index.html">Back to Home</a>

      <p class="note">Bot protection enabled.</p>
    </form>
  </div>
</div>
</body>
</html>
