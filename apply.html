<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply | B &amp; D Freight, Inc</title>

  <!-- Cloudflare Turnstile -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: #111827;
      padding: 24px;
      border-radius: 12px;
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #0f172a;
      color: white;
      margin-bottom: 16px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      background: #4ade80;
      color: black;
      cursor: pointer;
      margin-top: 12px;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #status {
      margin-top: 14px;
      font-weight: bold;
      min-height: 22px;
    }

    #status.error {
      color: #fca5a5;
    }

    #status.success {
      color: #86efac;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      color: #93c5fd;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .ts-wrap {
      margin-top: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Application Form</h1>

      <form id="apply-form">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" placeholder="Your Name" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Your Email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your Message" required></textarea>

        <div class="ts-wrap">
          <div
            class="cf-turnstile"
            data-sitekey="0x4AAAAAADAww3lhW9-k-dU8"
            data-callback="onTurnstileSuccess"
            data-expired-callback="onTurnstileExpired"
            data-error-callback="onTurnstileError">
          </div>
        </div>

        <button type="submit">Submit Application →</button>

        <div id="status"></div>
      </form>

      <a class="back-link" href="/prequal.html">← Back to Pre-Qualification</a>
    </div>
  </div>

  <script>
    const form = document.querySelector("#apply-form");
    const btn = form?.querySelector('button[type="submit"]');
    const statusEl = document.querySelector("#status");

    let token = "";

    function showStatus(message, type = "") {
      if (!statusEl) return;
      statusEl.textContent = message;
      statusEl.className = type || "";
    }

    function onTurnstileSuccess(t) {
      token = t;
      showStatus("");
      console.log("Turnstile success");
    }

    function onTurnstileExpired() {
      token = "";
      showStatus("Bot check expired. Please complete it again.", "error");
    }

    function onTurnstileError() {
      token = "";
      showStatus("Bot check failed to load. Please reload and try again.", "error");
    }

    window.onTurnstileSuccess = onTurnstileSuccess;
    window.onTurnstileExpired = onTurnstileExpired;
    window.onTurnstileError = onTurnstileError;

    if (!form || !btn) {
      console.error("Form or button missing");
    } else {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!token) {
          showStatus("Please complete the bot check.", "error");
          return;
        }

        const payload = Object.fromEntries(new FormData(form));
        payload["cf-turnstile-response"] = token;

        let success = false;
        btn.disabled = true;
        btn.innerText = "Submitting...";
        showStatus("");

        try {
          const res = await fetch("/.netlify/functions/apply", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          const text = await res.text();
          let data = {};

          try {
            data = text ? JSON.parse(text) : {};
          } catch {
            console.error("Non-JSON response:", text);
            showStatus("Server returned an invalid response.", "error");
            return;
          }

          if (!res.ok || !data.ok) {
            const detail =
              data?.error ||
              data?.detail?.error ||
              data?.detail?.message ||
              `Error ${res.status}`;

            console.error("Submission failed:", data);
            showStatus("Submission failed: " + detail, "error");
            return;
          }

          success = true;
          showStatus("Success! Redirecting...", "success");

          setTimeout(() => {
            window.location.href = "/thank-you.html";
          }, 1000);
        } catch (err) {
          console.error("Network/function error:", err);
          showStatus("Network error. Please try again.", "error");
        } finally {
          if (!success) {
            btn.disabled = false;
            btn.innerText = "Submit Application →";
          }
        }
      });
    }
  </script>
</body>
</html>
