<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You | B &amp; D Freight, Inc</title>
  <meta
    name="description"
    content="Thank you for your submission. B &amp; D Freight, Inc will review your information and follow up if there is a potential fit."
  />
  <style>
    :root {
      --bg: #070b14;
      --card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.10);
      --text: #e9eefc;
      --muted: #b8c4e6;
      --accent: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px;
    }

    .card {
      margin-top: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 12px;
      line-height: 1.2;
    }

    p {
      margin: 12px 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .highlight {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(125, 211, 252, 0.08);
      border: 1px solid rgba(125, 211, 252, 0.25);
      color: var(--text);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover,
    a:focus-visible {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 20px;
      }

      .card {
        margin-top: 20px;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Thank you</h1>

      <p>
        Your information has been received. Our team will review your submission
        and reach out directly if there is a potential fit.
      </p>

      <div class="highlight">
        <strong>Prepare for next steps:</strong>
        <p style="margin-top: 8px;">
          Please have the following ready if contacted:
        </p>
        <ul style="margin: 8px 0 0 18px; color: var(--muted);">
          <li>CDL documentation</li>
          <li>Insurance documents</li>
          <li>Consent for MVR review</li>
        </ul>
      </div>

      <p style="margin-top: 20px;">
        <a href="/">← Return to Home</a>
      </p>
    </section>
  </main>
</body>
</html>
